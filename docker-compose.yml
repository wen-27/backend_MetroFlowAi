services:
  mysql:
    image: mysql:8.4
    container_name: metroflow_mysql
    environment:
      MYSQL_DATABASE: metroflow_ai
      MYSQL_USER: metroflow
      MYSQL_PASSWORD: metroflow123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    container_name: metroflow_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  n8n:
    image: n8nio/n8n:latest
    container_name: metroflow_n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  mysql_data:
  chroma_data:
  n8n_data:


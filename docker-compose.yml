services:
  postgres:
    image: postgres:16
    container_name: metroflow_postgres
    environment:
      POSTGRES_DB: metroflow_ai
      POSTGRES_USER: metroflow
      POSTGRES_PASSWORD: metroflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metroflow -d metroflow_ai"]
      interval: 10s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    container_name: metroflow_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data

  n8n:
    image: n8nio/n8n:latest
    container_name: metroflow_n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  chroma_data:
  n8n_data:
